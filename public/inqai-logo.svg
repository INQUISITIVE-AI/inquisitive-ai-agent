<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <defs>
    <radialGradient id="coinGrad" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="40%" stop-color="#7C3AED"/>
      <stop offset="80%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#1E0A4A"/>
    </radialGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6D28D9" stop-opacity="0.3"/>
      <stop offset="75%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="52" cy="54" r="44" fill="#000000" opacity="0.3"/>
  <circle cx="50" cy="50" r="46" fill="url(#coinGrad)"/>
  <circle cx="50" cy="50" r="46" fill="url(#vignette)" opacity="0.4"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#rimGrad)" stroke-width="3"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#A78BFA" stroke-width="0.5" opacity="0.5"/>
  <g filter="url(#glow)">
    <rect x="45" y="28" width="10" height="44" rx="2" fill="url(#letterGrad)"/>
    <rect x="38" y="28" width="24" height="6" rx="2" fill="url(#letterGrad)"/>
    <rect x="38" y="66" width="24" height="6" rx="2" fill="url(#letterGrad)"/>
  </g>
  <ellipse cx="35" cy="30" rx="15" ry="10" fill="#FFFFFF" opacity="0.15" transform="rotate(-30 35 30)"/>
</svg>
