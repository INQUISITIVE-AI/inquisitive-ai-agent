# ── INQUISITIVE AI Oracle — Autonomous On-Chain Execution ────────────────────
# Runs every 10 minutes. Calls the Vercel serverless oracle endpoint, which:
#   1. Fetches live prices from CoinGecko
#   2. Runs the 5-engine AI brain on all 66 assets
#   3. Submits BUY/SELL/HOLD signals to InquisitiveVaultV2 on Ethereum mainnet
#   4. Calls performUpkeep() if the vault is ready to trade
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   CRON_SECRET       — must match CRON_SECRET in your Vercel project settings
#   ORACLE_PRIVATE_KEY — NOT needed here; stays in Vercel env vars only
#
# If CRON_SECRET is not set on Vercel, the endpoint is open (no auth check).
# ─────────────────────────────────────────────────────────────────────────────

name: INQAI Oracle Cron

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes, 24/7
  workflow_dispatch:          # also allows manual trigger from GitHub UI

jobs:
  run-oracle:
    name: Submit AI Signals to VaultV2
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger INQAI Oracle
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://getinqai.com/api/inquisitiveAI/cron/oracle" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 90)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Oracle call failed with status $HTTP_CODE"
            exit 1
          fi

          echo "$BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('skipped'):
            print(f'Skipped: {d.get(\"reason\")}')
          elif d.get('success'):
            print(f'Oracle success — regime={d[\"regime\"]} assets={d[\"trackedAssets\"]} buys={d[\"signals\"][\"buys\"]} sells={d[\"signals\"][\"sells\"]}')
            print(f'Signals tx: {d[\"signalsTx\"]}')
            if d.get('upkeepTx'):
              print(f'Upkeep tx: {d[\"upkeepTx\"]}')
          else:
            print(f'Error: {d.get(\"error\")}')
            sys.exit(1)
          " || true
