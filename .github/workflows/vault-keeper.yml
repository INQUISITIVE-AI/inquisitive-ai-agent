name: INQUISITIVE Vault Keeper

on:
  schedule:
    - cron: '*/5 * * * *'    # Every 5 minutes — GitHub Actions minimum interval
  workflow_dispatch:           # Manual trigger from GitHub Actions tab

jobs:
  keep:
    name: performUpkeep
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping keeper endpoint
        run: |
          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://getinqai.com/api/inquisitiveAI/execute/auto" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "=== Keeper response ==="
          cat /tmp/resp.json || true
          echo ""
          echo "HTTP status: $HTTP"
          [ "$HTTP" = "200" ] || exit 1
