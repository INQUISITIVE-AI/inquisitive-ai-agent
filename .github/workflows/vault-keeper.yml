name: INQUISITIVE Vault Keeper

on:
  workflow_dispatch:

concurrency:
  group: vault-keeper
  cancel-in-progress: false

jobs:
  keep:
    name: Execute Vault Keeper
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --prefer-offline

      - name: Run vault keeper
        env:
          KEEPER_PRIVATE_KEY:          ${{ secrets.KEEPER_PRIVATE_KEY || secrets.EXECUTOR_PRIVATE_KEY }}
          EXECUTOR_PRIVATE_KEY:        ${{ secrets.EXECUTOR_PRIVATE_KEY }}
          INQUISITIVE_VAULT_ADDRESS:   ${{ secrets.INQUISITIVE_VAULT_ADDRESS }}
          MAINNET_RPC_URL:             ${{ secrets.MAINNET_RPC_URL }}
        run: node scripts/keeper.js
