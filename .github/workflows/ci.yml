name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Node.js: lint, audit, build ──────────────────────────────────────────────
  node:
    name: Node.js — Lint, Audit, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Security audit (non-blocking — known transitive deps)
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Lint
        run: npm run lint --if-present

      - name: Build (Next.js)
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://getinqai.com
          NEXT_PUBLIC_WS_URL: wss://getinqai.com
          NEXT_PUBLIC_CHAIN_ID: 1
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci_placeholder
          NEXT_PUBLIC_VAULT_ADDRESS: 0x0000000000000000000000000000000000000001
          NEXT_PUBLIC_INQAI_TOKEN_ADDRESS: 0x0000000000000000000000000000000000000001
          NEXT_PUBLIC_STRATEGY_ADDRESS: 0x0000000000000000000000000000000000000001
          NEXT_PUBLIC_PRESALE_PRICE: 8
          NEXT_PUBLIC_TARGET_PRICE: 15
          NEXT_PUBLIC_TARGET_APY: 0.185
          NEXT_PUBLIC_TOTAL_SUPPLY: 100000000

  # ── Docker: verify image builds ──────────────────────────────────────────────
  docker:
    name: Docker — Build Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t inqai-backend:ci .

  # ── Solidity: compile + test ─────────────────────────────────────────────────
  foundry:
    name: Foundry — Compile + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies (provides @openzeppelin via node_modules)
        run: npm ci --legacy-peer-deps

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install forge-std
        run: forge install foundry-rs/forge-std --no-commit --no-git || true

      - name: Build contracts
        run: forge build --sizes

      - name: Run tests
        run: forge test -vv

      - name: Run Slither static analysis
        uses: crytic/slither-action@v0.3.0
        id: slither
        continue-on-error: true
        with:
          target: contracts/
          slither-args: '--filter-paths "node_modules|lib"'
