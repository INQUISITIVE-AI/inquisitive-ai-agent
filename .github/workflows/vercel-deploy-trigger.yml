name: Trigger Vercel Deploy

# Fires the Vercel deploy-hook when commits land on main. This is a safety net
# in case Vercel's GitHub integration stops auto-deploying (e.g. hit a free-tier
# deploy limit or the integration was revoked).
#
# Setup (one-time):
#   1. In Vercel → your project → Settings → Git → Deploy Hooks → Create Hook
#      (name it "main", pick branch "main")
#   2. Copy the URL
#   3. In GitHub → repo → Settings → Secrets and variables → Actions →
#      New repository secret → Name: VERCEL_DEPLOY_HOOK  Value: <paste URL>
#
# Without the secret this workflow is a no-op, so it is safe to commit as-is.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    name: Fire Vercel deploy hook
    runs-on: ubuntu-latest
    steps:
      - name: POST to Vercel deploy hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret is not set — skipping. Follow instructions at top of this file to enable."
            exit 0
          fi
          echo "Triggering Vercel deploy…"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$HOOK")
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $STATUS"
          echo "$BODY"
          if [ "$STATUS" -ge 400 ]; then
            echo "Deploy hook returned non-2xx — failing so you notice."
            exit 1
          fi
